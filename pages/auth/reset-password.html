<section class="auth-page">
  <div class="auth-card">

    <div class="auth-icon">
      <i class="fa-solid fa-lock"></i>
    </div>

    <h2>Reset Password</h2>
    <p class="auth-subtitle">
      Silakan buat password baru untuk akun Anda.
    </p>

    <div id="resetError" class="auth-error" style="display:none; margin:12px 0; padding:10px 12px; border-radius:10px; background:#fee2e2; color:#991b1b; font-weight:700;">
      Token reset tidak valid atau sudah kedaluwarsa.
    </div>

    <div id="resetOk" class="auth-info" style="display:none; margin:12px 0; padding:12px 14px; border-radius:12px; background:#dcfce7; color:#14532d; font-weight:800; line-height:1.5;">
      Password berhasil diperbarui. Silakan login kembali.
      <div style="margin-top:10px">
        <a href="#" class="btn btn-primary btn-sm nav-link" data-page="login">
          <i class="fa-solid fa-right-to-bracket" aria-hidden="true"></i> Login
        </a>
      </div>
    </div>

    <form id="resetPasswordForm">
      <label>Kode Reset</label>
      <input type="text" id="resetToken" placeholder="Kode reset" autocomplete="off" required>
      <p class="muted" style="margin:8px 0 14px; font-size:12px; line-height:1.6;">
        Pada sistem produksi, kode ini didapat dari tautan yang dikirim ke email.
      </p>

      <label>Password Baru</label>
      <input type="password" id="newPassword" placeholder="Minimal 8 karakter" required>

      <label>Konfirmasi Password Baru</label>
      <input type="password" id="confirmPassword" placeholder="Ulangi password" required>

      <button type="submit" class="btn-auth" style="display:flex; align-items:center; justify-content:center; gap:10px;">
        <i class="fa-solid fa-rotate-right" aria-hidden="true"></i> Perbarui Password
      </button>

      <a href="#" class="back-home nav-link" data-page="login" style="margin-top:16px;">
        ← Kembali ke Halaman Login
      </a>
    </form>
  </div>
</section>
