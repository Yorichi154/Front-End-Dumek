    <ul class="side-menu">
      <li><a class="nav-link" data-page="staf/dashboard" href="#staf/dashboard"><i class="fa-solid fa-gauge"></i>
          Dashboard</a></li>
      <li><a class="nav-link" data-page="staf/surat" href="#staf/surat"><i class="fa-solid fa-file-signature"></i>
          Surat Warga</a></li>
      <li><a class="nav-link" data-page="staf/pengaduan" href="#staf/pengaduan"><i class="fa-solid fa-comments"></i>
          Pengaduan Warga</a></li>

      <li><a class="nav-link" data-page="home" href="#home"><i class="fa-solid fa-arrow-left"></i> Ke Publik</a>

  <div class="staf-main">
    <div class="staf-top">
      <div>
        <h1>Chat Warga</h1>
        <div class="muted" style="font-weight:700">Diskusi tindak lanjut pengaduan</div>
      </div>

      <div class="top-actions">
        <a class="btn btn-ghost nav-link" data-page="staf/pengaduan" href="#staf/pengaduan"><i
            class="fa-solid fa-comments"></i> Kembali ke Pengaduan</a>
      </div>
    </div>

    <div class="chat-shell">
      <div class="chat-list">
        <div class="chat-list-head">
          <div style="font-weight:900">Percakapan</div>
          <div class="muted" style="font-size:12px">Berdasarkan pengaduan</div>
        </div>
        <div id="chatThreadList" class="chat-thread-list"></div>

        </div>

        <div id="chatMessages" class="chat-messages"></div>

        <form id="chatSendForm" class="chat-input" autocomplete="off">
          <input id="chatInput" type="text" placeholder="Tulis pesan..." />
          <button class="btn btn-primary" type="submit"><i class="fa-solid fa-paper-plane"></i> Kirim</button>
        </form>
