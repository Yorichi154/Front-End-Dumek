<section class="auth-page">
  <div class="auth-card wide">

    <div class="auth-icon">
      <i class="fa fa-user-plus"></i>
    </div>

    <h2>Daftar Akun Warga</h2>
    <p class="auth-subtitle">
      Lengkapi data diri Anda untuk mendaftar
    </p>

    <form class="register-form">
      <div class="form-grid">
        <div>
          <label>Nama Lengkap *</label>
          <input type="text" required>
        </div>
        <div>
          <label>NIK (16 digit) *</label>
          <input type="text" maxlength="16" required>
        </div>

        <div>
          <label>Email *</label>
          <input type="email" required>
        </div>
        <div>
          <label>No. Telepon *</label>
          <input type="tel" required>
        </div>
      </div>

      <label>Alamat Lengkap *</label>
      <input type="text" required>

      <div class="form-grid small">
        <div>
          <label>RT *</label>
          <input type="text" placeholder="01" required>
        </div>
        <div>
          <label>RW *</label>
          <input type="text" placeholder="02" required>
        </div>
      </div>

      <div class="form-grid">
        <div>
          <label>Password *</label>
          <input type="password" required>
        </div>
        <div>
          <label>Konfirmasi Password *</label>
          <input type="password" required>
        </div>
      </div>

      <button type="submit" class="btn-auth">Daftar Sekarang</button>
    </form>

    <div class="auth-links">
      Sudah punya akun? <a href="#" class="nav-link" data-page="login">Login di sini</a>
    </div>

    <a href="#" class="back-home nav-link" data-page="home">
      ← Kembali ke Beranda
    </a>

  </div>
</section>
